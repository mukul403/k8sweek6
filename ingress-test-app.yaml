apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
      - name: hello
        image: hashicorp/http-echo
        args:
        - "-text=Hello HTTPS 🚀"
        ports:
        - containerPort: 5678

---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    app: hello
  ports:
  - port: 80
    targetPort: 5678

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: my-app
  annotations:
    cert-manager.io/cluster-issuer: selfsigned   # 👈 change if using letsencrypt
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - myapp.172.18.255.200.nip.io   # 👈 CHANGE THIS IP
    secretName: my-tls-secret
  rules:
  - host: myapp.172.18.255.200.nip.io   # 👈 SAME HERE
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: my-service
            port:
              number: 80
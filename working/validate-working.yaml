apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-app
  labels:
    app: good-app
    env: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: good-app
  template:
    metadata:
      labels:
        app: good-app
        env: prod
    spec:
      containers:
        - name: nginx
          image: nginx:1.25   # ✅ no latest tag
          ports:
            - containerPort: 80

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10